<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioIntelligenza · Intelligent Biologic Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Varela Round', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, #0a2e1a 0%, #0d4028 50%, #0a2e1a 100%);
    padding: 2rem 1rem;
  }

  .card {
    background: #fff;
    border-radius: 28px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.45);
  }

  .card-header {
    background: linear-gradient(160deg, #0a2e1a 0%, #0f4a2c 55%, #1a7a45 100%);
    padding: 2.3rem 1.2rem 2.8rem;
    text-align: center;
    position: relative;
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 32px;
    background: #fff;
    border-radius: 50% 50% 0 0 / 32px 32px 0 0;
  }

  .tagline {
    color: rgba(255,255,255,0.72);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  .card-body {
    padding: 2rem 1.75rem 1.75rem;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 1rem 1.4rem;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    font-family: 'Varela Round', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    transition: transform 0.15s ease, filter 0.15s ease;
    margin-bottom: 1rem;
  }

  .btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.06);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn-web {
    background: linear-gradient(135deg, #3aab2e, #5fc93f);
    color: #fff;
    box-shadow: 0 6px 20px rgba(58,171,46,0.32);
  }

  .btn-ig {
    background: linear-gradient(135deg, #0d9488, #14b8a6);
    color: #fff;
    box-shadow: 0 6px 20px rgba(13,148,136,0.3);
  }

  .btn-icon {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg {
    width: 22px;
    height: 22px;
    fill: #fff;
  }

  .btn-label {
    flex: 1;
    text-align: left;
    line-height: 1.2;
  }

  .btn-label small {
    display: block;
    font-size: 0.68rem;
    opacity: 0.75;
    font-weight: 600;
    margin-bottom: 1px;
  }

  .divider {
    border: none;
    border-top: 1.5px solid #e2f0e8;
    margin: 1.25rem 0;
  }

  .section-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #94a89e;
    text-align: center;
    margin-bottom: 1rem;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0.8rem;
    text-decoration: none;
    color: #0f4a2c;
    font-size: 0.9rem;
    font-weight: 600;
    transition: color 0.15s;
  }

  .contact-item:hover {
    color: #3aab2e;
  }

  .contact-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #e8f7e4, #d4f0cd);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-icon svg {
    width: 18px;
    height: 18px;
    fill: #3aab2e;
  }

  .contact-text small {
    display: block;
    font-size: 0.65rem;
    color: #94a89e;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1px;
  }
</style>
</head>

<body>

<div class="card">

        Bio
      </text>

      <!-- TEXTO INTELLIGENZA -->
      <text
        x="92" y="84"
        font-family="'Varela Round', Arial, sans-serif"
        font-weight="700"
        font-size="50"
        fill="#08b7b0"
        letter-spacing="-2.5">
        Intelligenza
      </text>

      <!-- ® -->
      <text
        x="356" y="58"
        font-family="Arial, sans-serif"
        font-weight="400"
        font-size="13"
        fill="#0cb8a8"
        opacity="0.9">
        ®
      </text>

      <!-- LINEA -->
      <path
        d="M4 96 Q185 106 368 96"
        stroke="url(#underlineGrad)"
        stroke-width="3.5"
        fill="none"
        stroke-linecap="round"
        opacity="0.8"
      />

    </svg>

    <div class="tagline">
      Intelligent Biologic Solutions
